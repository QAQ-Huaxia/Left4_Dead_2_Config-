alias +rs "+reload; slot2fov"
alias -rs "-reload; slot1fov"
bind r "+rs ;+reload"

alias slot1fov "cl_viewmodelfovsurvivor 540"
alias slot2fov "cl_viewmodelfovsurvivor 100"

bind 1 "slot1; cl_viewmodelfovsurvivor 540"
bind 2 "slot2; slot2fov"

bind q "incrementvar cl_viewmodelfovsurvivor 1 540 -440;lastinv"
